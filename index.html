<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Felisha ❤️</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
    color: white;
    text-align: center;
}

.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/YKY28eT.png');
    animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
    from {transform: translateY(0);}
    to {transform: translateY(-1000px);}
}

.box {
    position: relative;
    z-index: 2;
    margin-top: 150px;
}

button {
    padding: 15px 30px;
    border: none;
    border-radius: 20px;
    background: pink;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="box">
    <h1>Felisha Sayang ❤️</h1>
    <p>Aku punya sesuatu untuk kamu...</p>
    <button onclick="alert('MAAFIN AKU YA SAYANG ❤️')">
        Klik Di Sini
    </button>
</div>

</body>
</html>
